name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-apk:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Restore
        run: dotnet restore PIDMobileSpeaker.csproj

      - name: Build Debug APK
        run: dotnet build PIDMobileSpeaker.csproj -f net10.0-android -c Debug -p:AndroidPackageFormat=apk

      - name: Find APK
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Filter *.apk | ForEach-Object { Write-Host $_.FullName }

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PIDMobileSpeaker-debug-apk
          path: |
            **/bin/Debug/net8.0-android/**/*.apk
            **/bin/Debug/net8.0-android/*.apk
