name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Restore
        run: dotnet restore PIDMobileSpeaker.csproj

      - name: Build Debug APK
        run: dotnet build PIDMobileSpeaker.csproj -f net10.0-android -c Debug -p:AndroidPackageFormat=apk

      - name: Collect APK
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Get-ChildItem -Recurse -Filter *.apk | ForEach-Object {
            Write-Host "Found APK:" $_.FullName
            Copy-Item $_.FullName -Destination artifacts
          }
          Get-ChildItem artifacts

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PIDMobileSpeaker-debug-apk
          path: artifacts/*.apk
